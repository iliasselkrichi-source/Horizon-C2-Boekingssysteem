<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T3 - Snelle Booking (Minimalistisch)</title>

    <!-- Externe Bibliotheken -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #333333;
            --bg-body: #ffffff;
            --bg-secondary: #f8fafc;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--primary);
        }

        .booking-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .input-minimal {
            border-bottom: 2px solid var(--border-color);
            background: transparent;
            padding: 12px 0;
            width: 100%;
            outline: none;
            transition: border-color 0.3s;
            border-radius: 0;
        }

        .input-minimal:focus {
            border-color: var(--primary);
        }

        #map {
            height: 300px;
            border-radius: 12px;
            margin-bottom: 2rem;
            filter: grayscale(1);
        }

        .vehicle-radio:checked + label {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .suggestion-list {
            position: absolute;
            z-index: 1000;
            background: white;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            margin-top: -2px;
        }

        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            font-size: 14px;
        }

        .suggestion-item:hover {
            background-color: var(--bg-secondary);
        }

        .total-price-box {
            background-color: var(--bg-secondary);
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- HEADER SECTIE -->
    <header id="main-header" class="py-6 border-b border-gray-100">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-xl font-bold tracking-tighter uppercase">DirectTaxi</span>
            </div>
            <div class="flex gap-4">
                <button onclick="setLanguage('nl')" class="text-xs font-bold hover:underline">NL</button>
                <button onclick="setLanguage('fr')" class="text-xs font-bold hover:underline">FR</button>
                <button onclick="setLanguage('en')" class="text-xs font-bold hover:underline">EN</button>
            </div>
        </div>
    </header>

    <main>
        <!-- HERO SECTIE -->
        <section id="hero" class="py-12 bg-gray-50">
            <div class="container mx-auto px-6 text-center">
                <h1 class="text-3xl md:text-4xl font-bold mb-4" data-i18n="hero_title">Boek Direct. Geen Gedoe.</h1>
            </div>
        </section>

        <!-- BOOKING SECTIE -->
        <section id="booking-section" class="py-16">
            <div class="container mx-auto px-6">
                <div class="booking-container">

                    <div id="map"></div>

                    <div class="space-y-12">
                        <!-- Route & Tijd -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
                            <div class="relative">
                                <label class="text-[10px] uppercase font-bold tracking-widest text-gray-400" data-i18n="label_pickup">Van</label>
                                <input type="text" id="pickup" class="input-minimal" placeholder="..." oninput="searchAddress(this.value, 'pickup')">
                                <div id="pickup-suggestions" class="suggestion-list hidden"></div>
                            </div>
                            <div class="relative">
                                <label class="text-[10px] uppercase font-bold tracking-widest text-gray-400" data-i18n="label_destination">Naar</label>
                                <input type="text" id="destination" class="input-minimal" placeholder="..." oninput="searchAddress(this.value, 'destination')">
                                <div id="destination-suggestions" class="suggestion-list hidden"></div>
                            </div>
                            <div>
                                <label class="text-[10px] uppercase font-bold tracking-widest text-gray-400" data-i18n="label_date">Wanneer</label>
                                <input type="date" id="booking-date" class="input-minimal">
                            </div>
                            <div>
                                <label class="text-[10px] uppercase font-bold tracking-widest text-gray-400" data-i18n="label_time">Hoe laat</label>
                                <input type="time" id="booking-time" class="input-minimal">
                            </div>
                        </div>

                        <!-- Voertuig Selectie -->
                        <div>
                            <label class="block text-[10px] uppercase font-bold tracking-widest text-gray-400 mb-6 text-center" data-i18n="step2_title">Voertuig Keuze</label>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="vehicle-list">
                                <!-- JS renders this -->
                            </div>
                        </div>

                        <!-- Extras (Simple toggles) -->
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 border-t border-b border-gray-100 py-10">
                            <div class="flex items-center justify-between">
                                <span class="text-sm font-medium" data-i18n="passengers_label">Passagiers</span>
                                <input type="number" id="passengers" min="1" max="8" value="1" class="w-12 text-center border-b border-gray-300 outline-none">
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="text-sm font-medium" data-i18n="child_seat_label">Kinderzitje</span>
                                <input type="number" id="child-seats" min="0" max="4" value="0" class="w-12 text-center border-b border-gray-300 outline-none" onchange="updatePrice()">
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="text-sm font-medium" data-i18n="wifi_label">WiFi</span>
                                <input type="checkbox" id="wifi-opt" class="accent-black" onchange="updatePrice()">
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="text-sm font-medium" data-i18n="water_label">Water</span>
                                <input type="number" id="water-bottles" min="0" max="10" value="0" class="w-12 text-center border-b border-gray-300 outline-none" onchange="updatePrice()">
                            </div>
                        </div>

                        <!-- Contactgegevens -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div>
                                <input type="text" id="guest-name" class="input-minimal" placeholder="Naam" data-i18n="label_name">
                            </div>
                            <div>
                                <input type="email" id="guest-email" class="input-minimal" placeholder="Email" data-i18n="label_email">
                            </div>
                            <div>
                                <input type="tel" id="guest-phone" class="input-minimal" placeholder="Telefoon" data-i18n="label_phone">
                            </div>
                        </div>

                        <!-- Betaalmethode -->
                        <div class="flex justify-center gap-8">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="payment-method" value="cash" class="accent-black" checked>
                                <span class="text-xs font-bold uppercase tracking-widest" data-i18n="payment_cash">Cash</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="payment-method" value="card" class="accent-black">
                                <span class="text-xs font-bold uppercase tracking-widest" data-i18n="payment_card">Kaart</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="payment-method" value="online" class="accent-black">
                                <span class="text-xs font-bold uppercase tracking-widest" data-i18n="payment_online">Online</span>
                            </label>
                        </div>

                        <!-- Submit -->
                        <div class="total-price-box">
                            <p class="text-[10px] uppercase font-bold tracking-widest text-gray-400 mb-2" data-i18n="total_price_label">Totaalprijs</p>
                            <p class="text-4xl font-light mb-8 total-price">€ 0.00</p>
                            <button onclick="submitBooking()" class="w-full max-w-sm bg-black text-white py-5 font-bold uppercase tracking-widest hover:opacity-80 transition" data-i18n="btn_submit">Bestel Nu</button>
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER SECTIE -->
    <footer id="main-footer" class="py-12 border-t border-gray-100 mt-20">
        <div class="container mx-auto px-6 text-center">
            <p class="text-xs text-gray-400 mb-1">Operated by Fleetconnect</p>
            <p class="text-xs text-gray-400 mb-8">Design by Ryzen Outsourcing</p>

            <div class="flex justify-center space-x-8 mb-8 text-[10px] font-bold uppercase tracking-widest">
                <a href="#" class="hover:text-black transition" data-i18n="footer_about">Over ons</a>
                <a href="#" class="hover:text-black transition" data-i18n="footer_services">Diensten</a>
                <a href="#" class="hover:text-black transition" data-i18n="footer_contact">Contact</a>
                <a href="#" class="hover:text-black transition" data-i18n="footer_privacy">Privacy</a>
            </div>

            <div class="flex justify-center space-x-6 mb-8 text-gray-400">
                <i class="fab fa-facebook-f hover:text-black cursor-pointer"></i>
                <i class="fab fa-instagram hover:text-black cursor-pointer"></i>
                <i class="fab fa-linkedin-in hover:text-black cursor-pointer"></i>
            </div>

            <p class="text-[10px] text-gray-300 uppercase tracking-widest">&copy; 2024</p>
        </div>
    </footer>

    <script>
        let map, pickupMarker, destinationMarker, routeLayer;
        let selectedVehicle = null;
        let currentLang = 'nl';

        const vehicles = [
            { id: 'sedan', name: 'Sedan', price: 45, seats: 4 },
            { id: 'executive', name: 'Executive', price: 75, seats: 3 },
            { id: 'vclass', name: 'V-Class', price: 95, seats: 7 },
            { id: 'suv', name: 'SUV', price: 85, seats: 4 }
        ];

        const translations = {
            nl: {
                hero_title: "Boek Direct. Geen Gedoe.",
                label_pickup: "Ophaallocatie", label_destination: "Bestemming", label_date: "Datum", label_time: "Tijd",
                step2_title: "Kies uw voertuig",
                passengers_label: "Passagiers", child_seat_label: "Kinderzitje", wifi_label: "WiFi", water_label: "Water",
                total_price_label: "Totaalprijs", btn_submit: "Bestel Nu",
                label_name: "Naam", label_email: "Email", label_phone: "Telefoon",
                payment_cash: "Contant", payment_card: "Kaart", payment_online: "Online",
                footer_about: "Wie zijn we", footer_services: "Diensten", footer_contact: "Contact", footer_privacy: "Privacy"
            },
            fr: {
                hero_title: "Réservez Directement. Sans tracas.",
                label_pickup: "Lieu de prise en charge", label_destination: "Destination", label_date: "Date", label_time: "Heure",
                step2_title: "Choisissez votre véhicule",
                passengers_label: "Passagers", child_seat_label: "Siège enfant", wifi_label: "WiFi", water_label: "Eau",
                total_price_label: "Prix total", btn_submit: "Commandez Maintenant",
                label_name: "Nom", label_email: "Email", label_phone: "Téléphone",
                payment_cash: "Espèces", payment_card: "Carte", payment_online: "En ligne",
                footer_about: "Qui sommes-nous", footer_services: "Services", footer_contact: "Contact", footer_privacy: "Confidentialité"
            },
            en: {
                hero_title: "Book Direct. No Hassle.",
                label_pickup: "Pickup Location", label_destination: "Destination", label_date: "Date", label_time: "Time",
                step2_title: "Choose vehicle",
                passengers_label: "Passengers", child_seat_label: "Child seat", wifi_label: "WiFi", water_label: "Water",
                total_price_label: "Total Price", btn_submit: "Order Now",
                label_name: "Name", label_email: "Email", label_phone: "Phone",
                payment_cash: "Cash", payment_card: "Card", payment_online: "Online",
                footer_about: "About us", footer_services: "Services", footer_contact: "Contact", footer_privacy: "Privacy"
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            renderVehicles();
            setLanguage('nl');
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('booking-date').value = today;
        });

        function initMap() {
            map = L.map('map', {zoomControl: false}).setView([51.2194, 4.4025], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        async function searchAddress(query, type) {
            const list = document.getElementById(`${type}-suggestions`);
            if (query.length < 3) { list.classList.add('hidden'); return; }
            try {
                const response = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=5`);
                const data = await response.json();
                list.innerHTML = '';
                if (data.features.length > 0) {
                    list.classList.remove('hidden');
                    data.features.forEach(f => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.innerText = `${f.properties.name || ''} ${f.properties.street || ''} ${f.properties.city || ''}`.trim();
                        div.onclick = () => {
                            document.getElementById(type).value = div.innerText;
                            list.classList.add('hidden');
                            if (type === 'pickup') { if(pickupMarker) map.removeLayer(pickupMarker); pickupMarker = L.marker([f.geometry.coordinates[1], f.geometry.coordinates[0]]).addTo(map); }
                            else { if(destinationMarker) map.removeLayer(destinationMarker); destinationMarker = L.marker([f.geometry.coordinates[1], f.geometry.coordinates[0]]).addTo(map); }
                            if (pickupMarker && destinationMarker) calculateRoute();
                            map.flyTo([f.geometry.coordinates[1], f.geometry.coordinates[0]], 15);
                        };
                        list.appendChild(div);
                    });
                }
            } catch (e) {}
        }

        async function calculateRoute() {
            const p1 = pickupMarker.getLatLng();
            const p2 = destinationMarker.getLatLng();
            try {
                const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${p1.lng},${p1.lat};${p2.lng},${p2.lat}?overview=full&geometries=geojson`);
                const d = await res.json();
                if (d.routes.length > 0) {
                    if (routeLayer) map.removeLayer(routeLayer);
                    routeLayer = L.geoJSON(d.routes[0].geometry, { style: { color: '#000', weight: 3 } }).addTo(map);
                    map.fitBounds(routeLayer.getBounds(), { padding: [30, 30] });
                }
            } catch (e) {}
        }

        function renderVehicles() {
            const container = document.getElementById('vehicle-list');
            container.innerHTML = vehicles.map(v => `
                <div>
                    <input type="radio" name="vehicle" id="v-${v.id}" value="${v.id}" class="hidden vehicle-radio" ${selectedVehicle?.id === v.id ? 'checked' : ''} onchange="selectVehicle('${v.id}')">
                    <label for="v-${v.id}" class="block border border-gray-200 p-4 rounded-xl text-center cursor-pointer hover:border-black transition">
                        <p class="font-bold text-sm">${v.name}</p>
                        <p class="text-xs text-gray-400">€ ${v.price}</p>
                    </label>
                </div>
            `).join('');
            if (!selectedVehicle) selectVehicle('sedan');
        }

        function selectVehicle(id) {
            selectedVehicle = vehicles.find(v => v.id === id);
            updatePrice();
        }

        function updatePrice() {
            let total = selectedVehicle ? selectedVehicle.price : 0;
            total += (parseInt(document.getElementById('child-seats').value) || 0) * 5;
            if(document.getElementById('wifi-opt').checked) total += 5;
            total += (parseInt(document.getElementById('water-bottles').value) || 0) * 3;
            document.querySelectorAll('.total-price').forEach(el => el.innerText = `€ ${total.toFixed(2)}`);
        }

        function submitBooking() {
            if (!document.getElementById('pickup').value || !document.getElementById('guest-name').value) {
                alert("Vul alle velden in.");
                return;
            }
            alert("Bestelling geplaatst!");
            location.reload();
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    if (el.tagName === 'INPUT') el.placeholder = translations[lang][key];
                    else el.innerText = translations[lang][key];
                }
            });
            renderVehicles();
        }
    </script>
</body>
</html>
