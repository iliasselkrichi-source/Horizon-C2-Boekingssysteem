<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T3 - Snelle Booking (Minimalistisch)</title>

    <!-- Externe Bibliotheken -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #333333;
            --bg-light: #ffffff;
            --input-bg: #f5f5f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: #333333;
        }

        .minimal-input {
            background-color: var(--input-bg);
            border: none;
            border-radius: 0;
            padding: 1rem;
            width: 100%;
            outline: none;
            transition: all 0.2s;
        }

        .minimal-input:focus {
            background-color: #ebebeb;
            box-shadow: inset 0 -2px 0 var(--primary);
        }

        #map {
            height: 300px;
            width: 100%;
            border-radius: 0;
            filter: grayscale(1);
        }

        .suggestion-list {
            position: absolute;
            z-index: 1000;
            background: white;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #eee;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .suggestion-item {
            padding: 0.8rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .suggestion-item:hover {
            background-color: var(--input-bg);
        }

        .vehicle-radio {
            display: none;
        }

        .vehicle-label {
            display: block;
            padding: 1rem;
            border: 1px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .vehicle-radio:checked + .vehicle-label {
            border-color: var(--primary);
            background-color: var(--primary);
            color: white;
        }

        .btn-black {
            background-color: var(--primary);
            color: white;
            padding: 1.2rem;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-black:hover {
            opacity: 0.9;
        }

        .btn-black:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <!-- HEADER SECTIE -->
    <header id="main-header" class="border-b border-gray-100">
        <div class="container mx-auto px-6 py-6 flex justify-between items-center">
            <div class="text-2xl font-bold tracking-tighter uppercase">QuickTaxi</div>

            <div class="flex gap-4">
                <button onclick="setLanguage('nl')" class="text-xs font-semibold hover:underline">NL</button>
                <button onclick="setLanguage('fr')" class="text-xs font-semibold hover:underline">FR</button>
                <button onclick="setLanguage('en')" class="text-xs font-semibold hover:underline">EN</button>
            </div>
        </div>
    </header>

    <main>
        <!-- HERO SECTIE -->
        <section id="hero" class="py-12 bg-white text-center">
            <div class="container mx-auto px-4">
                <h1 class="text-3xl font-light mb-2 uppercase tracking-widest" data-i18n="hero_title">Boek Direct</h1>
                <p class="text-gray-400 text-sm" data-i18n="hero_subtitle">Eenvoudig. Snel. Betrouwbaar.</p>
            </div>
        </section>

        <!-- BOOKING SECTIE -->
        <section id="booking-section" class="pb-20">
            <div class="container mx-auto px-4 max-w-4xl">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-0 border border-gray-100 shadow-2xl">

                    <!-- Kaart -->
                    <div id="map" class="md:h-full h-64 order-2 md:order-1"></div>

                    <!-- Formulier -->
                    <div class="p-8 order-1 md:order-2">
                        <div class="space-y-6">
                            <!-- Pickup + Destination op 1 rij -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="relative">
                                    <label class="text-[10px] uppercase font-bold text-gray-400 block mb-1" data-i18n="label_pickup">Van</label>
                                    <input type="text" id="pickup" class="minimal-input text-sm" placeholder="Ophaaladres..." oninput="searchAddress(this.value, 'pickup')">
                                    <div id="pickup-suggestions" class="suggestion-list hidden"></div>
                                </div>
                                <div class="relative">
                                    <label class="text-[10px] uppercase font-bold text-gray-400 block mb-1" data-i18n="label_destination">Naar</label>
                                    <input type="text" id="destination" class="minimal-input text-sm" placeholder="Bestemming..." oninput="searchAddress(this.value, 'destination')">
                                    <div id="destination-suggestions" class="suggestion-list hidden"></div>
                                </div>
                            </div>

                            <!-- Datum + Tijd op 1 rij -->
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] uppercase font-bold text-gray-400 block mb-1" data-i18n="label_date">Datum</label>
                                    <input type="date" id="booking-date" class="minimal-input text-sm">
                                </div>
                                <div>
                                    <label class="text-[10px] uppercase font-bold text-gray-400 block mb-1" data-i18n="label_time">Tijd</label>
                                    <input type="time" id="booking-time" class="minimal-input text-sm">
                                </div>
                            </div>

                            <!-- Voertuig keuze als radio buttons -->
                            <div>
                                <label class="text-[10px] uppercase font-bold text-gray-400 block mb-1" data-i18n="label_vehicle">Voertuig</label>
                                <div class="grid grid-cols-2 gap-2" id="vehicle-options">
                                    <!-- Opties worden door JS gegenereerd -->
                                </div>
                            </div>

                            <!-- Prijs direct tonen -->
                            <div class="pt-4 border-t border-gray-100 flex justify-between items-center">
                                <span class="text-xs uppercase font-bold text-gray-400" data-i18n="label_price">Geschatte Prijs</span>
                                <span class="text-2xl font-semibold" id="total-price">€ 0,00</span>
                            </div>

                            <!-- Persoonlijke gegevens kort -->
                            <div class="space-y-4 pt-4">
                                <input type="text" id="guest-name" class="minimal-input text-sm" placeholder="Uw Naam">
                                <input type="tel" id="guest-phone" class="minimal-input text-sm" placeholder="Telefoonnummer">
                            </div>

                            <button onclick="submitBooking()" id="submit-btn" class="btn-black mt-6" disabled data-i18n="btn_submit">Bestel nu</button>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <!-- FOOTER SECTIE -->
    <footer id="main-footer" class="py-12 border-t border-gray-100">
        <div class="container mx-auto px-4 text-center">
            <p class="text-[10px] uppercase font-bold mb-1">Operated by Fleetconnect</p>
            <p class="text-[10px] uppercase font-bold mb-6 text-gray-400">Design by Ryzen Outsourcing</p>

            <div class="flex justify-center space-x-6 mb-8 text-[10px] uppercase tracking-widest font-semibold">
                <a href="#" class="hover:text-gray-400 transition" data-i18n="footer_about">Over</a>
                <a href="#" class="hover:text-gray-400 transition" data-i18n="footer_services">Diensten</a>
                <a href="#" class="hover:text-gray-400 transition" data-i18n="footer_contact">Contact</a>
                <a href="#" class="hover:text-gray-400 transition" data-i18n="footer_privacy">Privacy</a>
            </div>

            <div class="flex justify-center space-x-6 mb-8">
                <i class="fab fa-facebook text-gray-300 hover:text-black cursor-pointer transition"></i>
                <i class="fab fa-instagram text-gray-300 hover:text-black cursor-pointer transition"></i>
                <i class="fab fa-linkedin text-gray-300 hover:text-black cursor-pointer transition"></i>
            </div>

            <p class="text-[10px] text-gray-300">&copy; 2024 - Alle rechten voorbehouden</p>
        </div>
    </footer>

    <script>
        // ========== CONFIGURATIE & DATA ==========
        let map, pickupMarker, destinationMarker, routeLayer;
        let selectedVehicle = null;
        let currentLang = 'nl';

        const vehicles = [
            { id: 'sedan', name: 'Sedan', price: 45 },
            { id: 'exec', name: 'Exec', price: 75 },
            { id: 'van', name: 'Van', price: 95 },
            { id: 'suv', name: 'SUV', price: 85 }
        ];

        const translations = {
            nl: {
                hero_title: "Boek Direct", hero_subtitle: "Eenvoudig. Snel. Betrouwbaar.",
                label_pickup: "Van", label_destination: "Naar", label_date: "Datum", label_time: "Tijd",
                label_vehicle: "Voertuig", label_price: "Geschatte Prijs", btn_submit: "Bestel nu",
                footer_about: "Over", footer_services: "Diensten", footer_contact: "Contact", footer_privacy: "Privacy"
            },
            fr: {
                hero_title: "Réserver Direct", hero_subtitle: "Simple. Rapide. Fiable.",
                label_pickup: "De", label_destination: "À", label_date: "Date", label_time: "Heure",
                label_vehicle: "Véhicule", label_price: "Prix Estimé", btn_submit: "Commander",
                footer_about: "À propos", footer_services: "Services", footer_contact: "Contact", footer_privacy: "Confidentialité"
            },
            en: {
                hero_title: "Book Directly", hero_subtitle: "Simple. Fast. Reliable.",
                label_pickup: "From", label_destination: "To", label_date: "Date", label_time: "Time",
                label_vehicle: "Vehicle", label_price: "Estimated Price", btn_submit: "Order now",
                footer_about: "About", footer_services: "Services", footer_contact: "Contact", footer_privacy: "Privacy"
            }
        };

        // ========== INITIALISATIE ==========
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            renderVehicleOptions();
            setLanguage('nl');

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('booking-date').setAttribute('min', today);
        });

        // ========== KAART FUNCTIES ==========
        function initMap() {
            map = L.map('map', {zoomControl: false}).setView([51.2194, 4.4025], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
        }

        async function searchAddress(query, type) {
            const list = document.getElementById(`${type}-suggestions`);
            if (query.length < 3) {
                list.classList.add('hidden');
                return;
            }

            try {
                const response = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=5`);
                const data = await response.json();

                list.innerHTML = '';
                if (data.features.length > 0) {
                    list.classList.remove('hidden');
                    data.features.forEach(feature => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        const name = feature.properties.name || '';
                        const city = feature.properties.city || '';
                        const street = feature.properties.street || '';
                        const label = `${name} ${street} ${city}`.trim();
                        div.innerText = label;
                        div.onclick = () => selectAddress(feature, type);
                        list.appendChild(div);
                    });
                } else {
                    list.classList.add('hidden');
                }
            } catch (error) {
                console.error('Fout bij zoeken adres:', error);
            }
        }

        function selectAddress(feature, type) {
            const [lon, lat] = feature.geometry.coordinates;
            const name = feature.properties.name || '';
            const city = feature.properties.city || '';
            const street = feature.properties.street || '';
            const label = `${name} ${street} ${city}`.trim();

            document.getElementById(type).value = label;
            document.getElementById(`${type}-suggestions`).classList.add('hidden');

            if (type === 'pickup') {
                if (pickupMarker) map.removeLayer(pickupMarker);
                pickupMarker = L.circleMarker([lat, lon], {radius: 8, color: 'black', fillColor: 'black', fillOpacity: 1}).addTo(map);
            } else {
                if (destinationMarker) map.removeLayer(destinationMarker);
                destinationMarker = L.circleMarker([lat, lon], {radius: 8, color: 'black', fillColor: 'white', fillOpacity: 1, weight: 2}).addTo(map);
            }

            if (pickupMarker && destinationMarker) {
                calculateRoute();
            }

            map.flyTo([lat, lon], 14);
            checkFormCompletion();
        }

        async function calculateRoute() {
            const p1 = pickupMarker.getLatLng();
            const p2 = destinationMarker.getLatLng();

            try {
                const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${p1.lng},${p1.lat};${p2.lng},${p2.lat}?overview=full&geometries=geojson`);
                const data = await response.json();

                if (data.routes && data.routes.length > 0) {
                    const route = data.routes[0];
                    if (routeLayer) map.removeLayer(routeLayer);

                    routeLayer = L.geoJSON(route.geometry, {
                        style: { color: 'black', weight: 3 }
                    }).addTo(map);

                    map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });
                }
            } catch (error) {
                console.error('Fout bij routeberekening:', error);
            }
        }

        // ========== BOEKING LOGICA ==========
        function renderVehicleOptions() {
            const container = document.getElementById('vehicle-options');
            container.innerHTML = vehicles.map(v => `
                <div class="relative">
                    <input type="radio" name="vehicle" id="v-${v.id}" class="vehicle-radio" value="${v.id}" onchange="selectVehicle('${v.id}')">
                    <label for="v-${v.id}" class="vehicle-label text-xs uppercase font-bold tracking-widest">${v.name}</label>
                </div>
            `).join('');

            // Auto select first
            document.getElementById('v-sedan').checked = true;
            selectVehicle('sedan');
        }

        function selectVehicle(id) {
            selectedVehicle = vehicles.find(v => v.id === id);
            document.getElementById('total-price').innerText = `€ ${selectedVehicle.price.toFixed(2)}`;
            checkFormCompletion();
        }

        function checkFormCompletion() {
            const pickup = document.getElementById('pickup').value;
            const dest = document.getElementById('destination').value;
            const date = document.getElementById('booking-date').value;
            const time = document.getElementById('booking-time').value;
            const name = document.getElementById('guest-name').value;

            const btn = document.getElementById('submit-btn');
            btn.disabled = !(pickup && dest && date && time && name && selectedVehicle);
        }

        // Event listeners voor real-time check
        ['pickup', 'destination', 'booking-date', 'booking-time', 'guest-name'].forEach(id => {
            document.getElementById(id).addEventListener('input', checkFormCompletion);
            document.getElementById(id).addEventListener('change', checkFormCompletion);
        });

        function submitBooking() {
            alert(currentLang === 'nl' ? "Bestelling geplaatst!" : "Commande passée !");
            location.reload();
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.innerText = translations[lang][key];
                }
            });
            // Update placeholders manually
            const inputs = {
                'pickup': 'label_pickup',
                'destination': 'label_destination',
                'guest-name': 'nl' === lang ? 'Uw Naam' : (lang === 'fr' ? 'Votre Nom' : 'Your Name'),
                'guest-phone': 'nl' === lang ? 'Telefoonnummer' : (lang === 'fr' ? 'Téléphone' : 'Phone Number')
            };

            for(let id in inputs) {
                const el = document.getElementById(id);
                if (el) {
                    if (translations[lang][inputs[id]]) {
                        el.placeholder = translations[lang][inputs[id]] + "...";
                    } else {
                        el.placeholder = inputs[id];
                    }
                }
            }
        }
    </script>
</body>
</html>
