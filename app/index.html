<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon C2 | Team Alpha - Boekingen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h1>🏠 Team Alpha — Boeking</h1>
        
        <div class="card ta-form">
            <h3>Nieuwe Boeking Invoeren</h3>
            
            <label>Kies Unit:</label>
            <select id="taUnitSelect">
                <option value="U1" data-resource="VILLA_ALHOURA" data-price="500" data-type="Villa">TA-U1 - Al Houara Villa (€500/nacht)</option>
                <option value="U2" data-resource="VILLA_LA_PERLA" data-price="400" data-type="Villa">TA-U2 - La Perla (€400/nacht)</option>
                <option value="U3" data-resource="VILLA_AL_BAHAR" data-price="400" data-type="Villa">TA-U3 - Al Bahar (€400/nacht)</option>
                <option value="U4" data-resource="VILLA_LE_ROCHER" data-price="400" data-type="Villa">TA-U4 - Le Rocher (€400/nacht)</option>
                <option value="U5" data-resource="VILLA_ESSENCE" data-price="150" data-type="Suite">TA-U5 - L'Essence Suite (€150/nacht)</option>
                <option value="U6" data-resource="VILLA_OASIS" data-price="150" data-type="Appartement">TA-U6 - Oasis de Paix (€150/nacht)</option>
                <option value="U7" data-resource="VILLA_REFUGE" data-price="150" data-type="Studio">TA-U7 - Le Refuge (€150/nacht)</option>
                <option value="U8" data-resource="VILLA_IMPERIAL" data-price="195" data-type="Duplex">TA-U8 - Imperial Duplex (€195/nacht)</option>
                <option value="U9" data-resource="VILLA_PALMERAIE" data-price="195" data-type="Villa">TA-U9 - Palmeraie Royale (€195/nacht)</option>
                <option value="U10" data-resource="VILLA_SKYLINE" data-price="195" data-type="Penthouse">TA-U10 - Sovereign Skyline (€195/nacht)</option>
            </select>

            <label>Gastnaam:</label>
            <input type="text" id="taGuestName" placeholder="Volledige naam">

            <label>Email:</label>
            <input type="email" id="taGuestEmail" placeholder="naam@voorbeeld.com">

            <label>Telefoon:</label>
            <input type="tel" id="taGuestPhone" placeholder="+212 ...">

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Check-in:</label>
                    <input type="date" id="taCheckIn">
                </div>
                <div style="flex: 1;">
                    <label>Check-out:</label>
                    <input type="date" id="taCheckOut">
                </div>
            </div>

            <label>
                <input type="checkbox" id="taTransfer"> Luchthaven Transfer nodig?
            </label>

            <label>Speciale wensen:</label>
            <textarea id="taSpeciaal" rows="3"></textarea>

            <label>Totaalprijs (€):</label>
            <input type="number" id="taTotaalprijs" readonly style="background: #eee; font-weight: bold;">

            <button id="taBookBtn" class="btn-primary" style="margin-top: 20px; width: 100%; padding: 15px; background: #1e293b; color: white; border: none; border-radius: 8px; cursor: pointer;">
                BEVESTIG BOEKING
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
